services:
  - type: web
    name: undangan-digital
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore  # paling dekat dengan Indonesia
    branch: main
    autoDeploy: true   # otomatis deploy setiap git push

    envVars:
      - key: APP_NAME
        value: Undangan Digital
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true   # Render generate otomatis!
      - key: DB_CONNECTION
        value: mysql
      - key: DB_DATABASE
        value: /var/www/html/database/database.mysql
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: 
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr